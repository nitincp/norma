version: "3.8"

# Self-hosted Langfuse + its Postgres dependency.
# Langfuse UI is port-forwarded to localhost:3000 via VS Code tunnel.

services:
  langfuse-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    networks:
      - norma-net

  langfuse-server:
    image: langfuse/langfuse:latest
    restart: unless-stopped
    depends_on:
      - langfuse-db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3000
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: "false"
    networks:
      - norma-net

  litellm-gateway:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      - norma-net

volumes:
  langfuse-db-data:

networks:
  norma-net:
    name: norma-net
    driver: bridge
